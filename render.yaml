services:
  - type: web
    name: fb-ads-scraper
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # No disk: the Render free plan doesn't support persistent disks.
    # The app is designed to work without one — see README for details.
    # Files written to /app/static/outputs/ live only for the duration of
    # the request that wrote them. Download them in the same session.
