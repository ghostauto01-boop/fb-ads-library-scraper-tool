name: Scrape Ad Library (Paste Link)
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Facebook Ads Library URL'
        required: true
        default: 'https://web.facebook.com/ads/library/?active_status=active&ad_type=all&country=US&is_targeted_country=false&media_type=all&q=women%20fashion&search_type=keyword_unordered&sort_data[mode]=total_impressions&sort_data[direction]=desc'
      pages:
        description: 'Pages to load'
        required: true
        default: '30'
        type: choice
        options: ['10','20','30','50','100']
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - run: python scraper.py "${{ inputs.url }}" "${{ inputs.pages }}"
      - uses: actions/upload-artifact@v4
        with:
          name: fb-ads-${{ github.run_number }}
          path: static/outputs/
          retention-days: 30
